name: 주식 추천 봇

on:
  schedule:
    - cron: '30 23 * * 0-4'  # 한국시간 평일 08:30 (UTC 전날 23:30)
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -c "import groq; print('✅ groq 설치 확인')"

      - name: 봇 실행
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python run_cloud.py

      - name: 리포트 GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          include_files: report_latest.html
          publish_branch: gh-pages
